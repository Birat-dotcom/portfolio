<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMatrix - Menu</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

<!-- Header -->
<header>
  <h1>Meal Matrix Restaurant System</h1>

  <nav>
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
    <a href="menu.html"><i class="fas fa-utensils"></i> Menu</a>
    <a href="reservation.html"><i class="fas fa-calendar-alt"></i> Reservation</a>
    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
  </nav>
</header>

<!-- Menu -->
<main>
  <section id="menu" class="section">
    <h2>🍽 Our Menu</h2>

    <div class="menu">

      <div class="card">
        <h3>Burger</h3>
        <p>Rs. 250</p>
        <button onclick="addToCart('Burger', 250)">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>

      <div class="card">
        <h3>Momo</h3>
        <p>Rs. 200</p>
        <button onclick="addToCart('Momo', 200)">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>

      <div class="card">
        <h3>Coke</h3>
        <p>Rs. 100</p>
        <button onclick="addToCart('Coke', 100)">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>

      <div class="card">
        <h3>Pizza</h3>
        <p>Rs. 560</p>
        <button onclick="addToCart('Pizza', 560)">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>

      <div class="card">
        <h3>Chicken Momo</h3>
        <p>Rs. 115</p>
        <button onclick="addToCart('Chicken Momo', 115)">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>

    </div>

    <h3 id="orderTotal">Total: Rs. 0</h3>
  </section>
</main>

<!-- Toast -->
<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
