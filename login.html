<!doctype html>
<html lang="en">
<head>

  <!-- Login Section -->
  <main>
    <section id="login" class="section">
      <h2>Login</h2>
      <div class="form">
        <input type="email" id="email" placeholder="Email">

        <button onclick="login()">Login</button>

      <p id="welcome"></p>
    </section>
  </main>
  <script src="script.js"></script>
  <div id="toast"></div>
