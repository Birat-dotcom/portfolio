<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMatrix - Reservation</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Meal Matrix Restaurant System</h1>

    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
      <a href="menu.html"><i class="fas fa-utensils"></i> Menu</a>
      <a href="reservation.html"><i class="fas fa-calendar-alt"></i> Reservation</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </nav>
  </header>

  <!-- Reservation Section -->
  <main>
    <section id="reservation" class="section">
      <h2>🍽 Book Your Table</h2>

      <div class="form">

        <input type="text" id="rname" placeholder="Enter your full name">

        <input type="date" id="rdate" title="Select reservation date"placeholder="Enter Full Date">

        <input type="time" id="rtime" title="Select reservation time"placeholder="Enter Full Time">

        <button onclick="bookTable()">
          <i class="fas fa-check-circle"></i> Book Table
        </button>

      </div>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
