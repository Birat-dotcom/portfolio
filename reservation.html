<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMatrix - Reservation</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- Header -->
  <header>
     <a href="index.html" class="logo-container">
    <i class="fas fa-utensils logo-icon"></i>
    <h1 class="logo-text">Meal Matrix</h1>
  </a>

    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
      <a href="menu.html"><i class="fas fa-utensils"></i> Menu</a>
      <a href="reservation.html"><i class="fas fa-calendar-alt"></i> Reservation</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </nav>
  </header>

  <!-- Reservation Section -->
  <main>
    <section id="reservation" class="section">
      <h2>🍽 Book Your Table</h2>

      <div class="form">

        <input type="text" id="rname" placeholder="Enter your full name">

         <input type="text" id="rdate" placeholder="Select reservation date" onfocus="(this.type='date')"
          onblur="(this.value ? this.type='date' : this.type='text')">
        <input type="text" id="rtime" placeholder="Select reservation time" onfocus="(this.type='time')"
          onblur="(this.value ? this.type='time' : this.type='text')">

        <button onclick="bookTable()">
          <i class="fas fa-check-circle"></i> Book Table
        </button>

      </div>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
